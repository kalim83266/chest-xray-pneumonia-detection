name: chest-xray-env

channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pytorch
  - torchvision
  - torchaudio
  - cpuonly   # 🔹 Remove this line if using GPU
  - numpy
  - pandas
  - matplotlib
  - seaborn
  - scikit-learn
  - jupyterlab
  - tensorboard
  - pip
  - pip:
      - tqdm
      - opencv-python